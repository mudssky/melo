# Melo 示例配置。复制为 config.toml，或通过 MELO_CONFIG_PATH / MELO_CONFIG 指定。

[database]
# SQLite 数据库文件路径。相对路径会以当前配置文件所在目录为锚点解析。
path = "melo.db"

[daemon]
# Daemon 默认监听主机。
host = "127.0.0.1"
# Daemon 首选基础端口。
base_port = 38123
# 首选端口被占用时的自动避让次数。
port_search_limit = 32
# 文档访问策略：disabled / local / network。
docs = "local"

[logging]
# 终端与文件日志的默认等级。
level = "warning"
# 终端输出格式：pretty / json。
terminal_format = "pretty"
# 文件输出格式：pretty / json。
file_format = "json"
# 是否默认启用组件前缀。
prefix_enabled = true
# CLI 终端前缀。
cli_prefix = "cli"
# Daemon 终端前缀。
daemon_prefix = "daemon"

[logging.cli]
# 是否启用 CLI 文件日志。
file_enabled = true
# CLI 文件日志路径。相对路径以配置文件所在目录解析。
file_path = "logs/cli.log"

[logging.daemon]
# 是否启用 daemon 文件日志。
file_enabled = true
# daemon 文件日志路径。相对路径以配置文件所在目录解析。
file_path = "logs/daemon.log"
# 是否允许命令通过 --daemon-log-level 临时覆盖 daemon 级别。
# 当前阶段只对“由本次命令自动拉起的 daemon”生效。
allow_runtime_level_override = true

[player]
# 后端选择：`auto`、`rodio`、`mpv`。
backend = "auto"
# 无恢复会话时的默认音量。
volume = 100
# 是否恢复上一次 daemon 会话。
restore_last_session = true
# 恢复后是否自动继续播放。
resume_after_restore = false

[player.mpv]
# `mpv` 可执行文件路径。
path = "mpv"
# IPC 目录。`auto` 表示自动选择。
ipc_dir = "auto"
# 额外传给 `mpv` 的命令行参数。
extra_args = []

[open]
# 裸 `melo` 是否先尝试扫描当前目录。
scan_current_dir = true
# 目录型打开的递归深度。
max_depth = 2
# 进入 TUI 前同步预热的曲目数。
prewarm_limit = 20
# 后台补扫并发度。
background_jobs = 4

[playlists.ephemeral]
# 默认 TTL，单位为秒。`0` 表示永不过期。
default_ttl_seconds = 0

[playlists.ephemeral.visibility]
# 单文件临时歌单是否出现在常规列表中。
path_file = false
# 目录临时歌单是否出现在常规列表中。
path_dir = true
# 当前目录临时歌单是否出现在常规列表中。
cwd_dir = true

[tui]
# 是否显示底部快捷键提示。
show_footer_hints = true
# 是否启用鼠标操作。
mouse_enabled = true

[tui.keymap]
# 焦点切换。
focus_next = ["tab", "l"]
focus_prev = ["shift+tab", "h"]
# 列表导航。
move_up = ["up", "k"]
move_down = ["down", "j"]
jump_top = ["home", ["g", "g"]]
jump_bottom = ["end", "shift+g"]
page_up = ["pageup"]
page_down = ["pagedown"]
# 通用确认与播放器控制。
activate = ["enter"]
toggle_playback = ["space"]
next = [">"]
prev = ["<"]
cycle_repeat_mode = ["r"]
toggle_shuffle = ["s"]
open_help = ["?"]
quit = ["q"]

[templates.runtime.scan]
# 目录扫描开始时输出给 CLI 的提示。
cli_start = "Scanning {{ source_label }}..."
# 预热完成、即将进入 TUI 时输出给 CLI 的提示。
cli_handoff = "Launching TUI, background scan continues..."
# TUI 顶部活动任务条。
tui_active = "Scanning {{ source_label }}... {{ indexed_count }} / {{ discovered_count }} · {{ current_item_name }}"
# 扫描完成后短暂显示的任务摘要。
tui_done = "Scan complete: {{ queued_count }} tracks indexed"
# 扫描失败后短暂显示的任务摘要。
tui_failed = "Scan failed: {{ error_message }}"

[library.organize]
# 文件整理的基础目录。
base_dir = "D:/Library"
# 冲突处理策略。
conflict_policy = "first_match"

[[library.organize.rules]]
name = "default"
priority = 0
template = "{{ artist|sanitize }}/{{ album|default('Unknown Album')|sanitize }}/{{ title|sanitize }}"

[playlists.smart.aimer]
query = "artist:\"Aimer\""
description = "All songs whose artist contains Aimer"
